<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="100" fill="#0a0a0f"/>
  <rect width="512" height="512" rx="100" fill="url(#grad512)"/>
  <defs>
    <linearGradient id="grad512" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <!-- Wine glass -->
  <g transform="translate(256,256)">
    <!-- Glass bowl -->
    <ellipse cx="0" cy="-55" rx="74" ry="84" fill="none" stroke="#c0392b" stroke-width="13" opacity="0.9"/>
    <!-- Wine fill -->
    <ellipse cx="0" cy="-22" rx="58" ry="38" fill="#c0392b" opacity="0.85"/>
    <!-- Wine surface highlight -->
    <ellipse cx="0" cy="-22" rx="58" ry="8" fill="#e74c3c" opacity="0.3"/>
    <!-- Glass stem -->
    <line x1="0" y1="30" x2="0" y2="108" stroke="#d4a017" stroke-width="12" stroke-linecap="round"/>
    <!-- Glass base -->
    <ellipse cx="0" cy="114" rx="54" ry="14" fill="none" stroke="#d4a017" stroke-width="11" opacity="0.9"/>
    <!-- Shine -->
    <ellipse cx="-24" cy="-80" rx="13" ry="24" fill="white" opacity="0.15" transform="rotate(-20,-24,-80)"/>
    <!-- Small stars/bubbles -->
    <circle cx="18" cy="-45" r="4" fill="#d4a017" opacity="0.5"/>
    <circle cx="-20" cy="-55" r="3" fill="#d4a017" opacity="0.35"/>
    <circle cx="30" cy="-65" r="2.5" fill="#d4a017" opacity="0.4"/>
  </g>
</svg>
