<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="40" fill="#0a0a0f"/>
  <rect width="192" height="192" rx="40" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <!-- Wine glass -->
  <g transform="translate(96,96)">
    <!-- Glass bowl -->
    <ellipse cx="0" cy="-20" rx="28" ry="32" fill="none" stroke="#c0392b" stroke-width="5" opacity="0.9"/>
    <!-- Wine fill -->
    <ellipse cx="0" cy="-8" rx="22" ry="14" fill="#c0392b" opacity="0.85"/>
    <!-- Glass stem -->
    <line x1="0" y1="12" x2="0" y2="42" stroke="#d4a017" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Glass base -->
    <ellipse cx="0" cy="44" rx="20" ry="5" fill="none" stroke="#d4a017" stroke-width="4" opacity="0.9"/>
    <!-- Shine -->
    <ellipse cx="-9" cy="-30" rx="5" ry="9" fill="white" opacity="0.15" transform="rotate(-20,-9,-30)"/>
  </g>
</svg>
