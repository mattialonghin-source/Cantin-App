<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full bleed background for maskable -->
  <rect width="512" height="512" fill="#0a0a0f"/>
  <rect width="512" height="512" fill="url(#gradm)"/>
  <defs>
    <linearGradient id="gradm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <!-- Wine glass - slightly smaller to fit safe zone -->
  <g transform="translate(256,256)">
    <ellipse cx="0" cy="-50" rx="66" ry="76" fill="none" stroke="#c0392b" stroke-width="12" opacity="0.9"/>
    <ellipse cx="0" cy="-20" rx="52" ry="34" fill="#c0392b" opacity="0.85"/>
    <ellipse cx="0" cy="-20" rx="52" ry="7" fill="#e74c3c" opacity="0.3"/>
    <line x1="0" y1="26" x2="0" y2="96" stroke="#d4a017" stroke-width="11" stroke-linecap="round"/>
    <ellipse cx="0" cy="102" rx="50" ry="12" fill="none" stroke="#d4a017" stroke-width="10" opacity="0.9"/>
    <ellipse cx="-22" cy="-74" rx="12" ry="22" fill="white" opacity="0.15" transform="rotate(-20,-22,-74)"/>
  </g>
</svg>
